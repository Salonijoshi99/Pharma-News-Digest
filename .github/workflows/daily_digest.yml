name: Send Daily Pharma Digest

on:
  schedule:
    - cron: '0 8 * * *'  # Runs at 08:00 UTC daily
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser resend

      - name: Run digest script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PARTNER_EMAILS: ${{ secrets.PARTNER_EMAILS }}
        run: python main.py